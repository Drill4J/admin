openapi: 3.0.0
info:
  title: Drill4J API
  version: 1.0.0
paths:
  #Settings Endpoints
  /api/group-settings/{groupId}:
    get:
      summary: Get group settings
      description: |
        Retrieves the configuration settings for a specific application group.
      operationId: getGroupSettingsById
      tags:
        - settings
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier for the application group whose settings are being retrieved.
          schema:
            type: string
      responses:
        '200':
          description: Group settings retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
    put:
      summary: Save group settings
      description: |
        Creates or updates configuration settings for a specific application group. 
        If settings already exist for the group, they are overwritten with the new values.
      operationId: updateGroupSettingsById
      tags:
        - settings
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier for the application group whose settings are being saved.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupSettingsPayload'
      responses:
        '200':
          description: Group settings saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
    delete:
      summary: Delete group settings
      description: |
        Removes all configuration settings for a specific application group, resetting them to system defaults.
        After deletion, the group will use the global default values.
      operationId: deleteGroupSettingsById
      tags:
        - settings
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier for the application group whose settings are being deleted.
          schema:
            type: string
      responses:
        '204':
          description: Group settings deleted successfully

  # Data Ingest Endpoints
  /api/data-ingest/builds:
    put:
      summary: Persist application build identity
      description: |
        Saves application build identity information, including groupId, appId, commitSha, and buildVersion.
        This endpoint only persists the build identity fields. To save additional Git metadata (branch, commitDate,
        commitMessage, commitAuthor), use the PUT /api/data-ingest/builds/info endpoint.
      operationId: putBuild
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/BuildPayload'
      responses:
        '200':
          description: Build saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/builds/info:
    put:
      summary: Persist application build Git metadata
      description: |
        Saves Git metadata (branch, commitDate, commitMessage, commitAuthor) for an application build.
        The build is identified by groupId, appId, commitSha, and buildVersion. If a build with the given
        identity does not exist, a new build is created. If it already exists, only the Git metadata fields
        are updated while preserving the existing identity and instance data.
      operationId: putBuildInfo
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/BuildPayload'
      responses:
        '200':
          description: Build info saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/instances:
    put:
      summary: Persist application instance metadata
      description: |
        Saves information about a running instance of the application deployed in a specific environment. 
        An instance represents a concrete deployment of an application build in a particular environment (e.g., development, staging, production).
        This endpoint captures the association between a specific build version deployed on an instance and the environment where it runs, 
        enabling tracking of code changes and test execution across different deployment environments.
      operationId: putInstance
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstancePayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/InstancePayload'
      responses:
        '200':
          description: Instance saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/coverage:
    post:
      summary: Persist code coverage data
      description: |
        Saves detailed code coverage data collected from test executions. The endpoint ingests execution probes (bytecode instrumentation data)
        that track which methods and code paths were executed during testing. Coverage data is associated with a specific test session, test launch
        and application instance to enable measurement of test effectiveness and identification of untested code changes.
      operationId: postCoverage
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoveragePayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/CoveragePayload'
      responses:
        '200':
          description: Coverage saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/methods:
    put:
      summary: Persist application methods metadata
      description: |
        Saves detailed metadata for all methods/functions in an application build, including method signatures,
        bytecode instrumentation information (probes), and checksums. This endpoint captures the structural information
        required to understand which code locations can be instrumented for coverage analysis.
      operationId: putMethods
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MethodsPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/MethodsPayload'
      responses:
        '200':
          description: Methods saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/tests-metadata:
    post:
      summary: Persist test definitions and launches in a single operation
      description: |
        Saves test metadata (test definitions and test launches) in a single consolidated API call.
        This endpoint is an alternative to the separate two-step process of first calling /api/data-ingest/test-definitions
        and then /api/data-ingest/test-launches. Use this endpoint when you have both test definition metadata and execution results
        available at the same time and want to persist them together.
      operationId: postTestsMetadata
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTestsPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/AddTestsPayload'
      responses:
        '200':
          description: Test metadata saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/test-definitions:
    post:
      summary: Persist test definition metadata
      description: |
        Saves metadata for all test definitions in the system. A test definition is the specification or blueprint
        for a test, including its unique identifier, runner type (JUnit, TestNG, etc.), name, location, and any custom metadata or tags.
      operationId: postTestDefinitions
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTestDefinitionsPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/AddTestDefinitionsPayload'
      responses:
        '200':
          description: Test definitions saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/test-launches:
    post:
      summary: Persist test execution records
      description: |
        A test launch is a concrete instance of executing a specific test,
        with associated execution result and timing information. Multiple test launches are grouped into a single test session
        to represent a cohesive test run (e.g., all tests executed in a single CI/CD pipeline build).
        
        Test launches establish the relationship between test definitions (blueprint of what to test) and coverage data (what code was executed),
        enabling analysis of test effectiveness and identification of which tests exercise which code changes. Each launch references a previously
        saved test definition by id and belongs to a test session that contextualizes the execution.
      operationId: postTestLaunches
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTestLaunchesPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/AddTestLaunchesPayload'
      responses:
        '200':
          description: Test launches saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/sessions:
    put:
      summary: Persist test session metadata
      description: |
        Saves a test session that groups multiple test launches to represent a cohesive test run (e.g., all tests executed in a single CI/CD pipeline build).        
        The session metadata also establishes the relationship between test launches (individual test executions) and the application builds
        being tested.
      operationId: putTestSession
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/SessionPayload'
      responses:
        '200':
          description: Test sessions saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/method-ignore-rules:
    post:
      summary: Save method ignore rule
      description: |
        Creates a new rule for excluding methods from coverage analysis and metrics computation.
        Rules are matched by name pattern and/or class name pattern using glob-style matching.

        **Note:** Newly created rules are automatically applied during subsequent ETL cycles for new data only.
        If you need the rule to take effect for already loaded data, trigger an ETL refresh from scratch
        by calling `POST /api/metrics/refresh?reset=true`.
      operationId: postMethodIgnoreRules
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MethodIgnoreRulePayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/MethodIgnoreRulePayload'
      responses:
        '200':
          description: Method ignore rule saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
    get:
      summary: Get all method ignore rules
      description: |
        Retrieves the complete list of method ignore rules configured in the system.
        Each rule defines patterns (name and/or class name) used to exclude matching methods
        from coverage analysis and metrics computation.

        **Note:** Changes to ignore rules (creation or deletion) are automatically applied during subsequent ETL cycles
        for new data only. If you need updated rules to take effect for already loaded data, trigger an ETL refresh
        from scratch by calling `POST /api/metrics/refresh?reset=true`.
      operationId: getAllMethodIgnoreRules
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      responses:
        '200':
          description: List of method ignore rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/data-ingest/method-ignore-rules/{id}:
    delete:
      summary: Delete method ignore rule by ID
      description: |
        Removes a specific method ignore rule by its unique identifier.

        **Note:** After deleting a rule, previously excluded methods will only reappear in metrics after
        an ETL refresh from scratch. Trigger it by calling `POST /api/metrics/refresh?reset=true`.
      operationId: deleteMethodIgnoreRuleById
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: Unique numeric identifier of the method ignore rule to delete.
          schema:
            type: integer
      responses:
        '200':
          description: Method ignore rule deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  # Data Management Endpoints
  /api/data-management/groups/{groupId}/apps/{appId}/builds/{buildId}:
    delete:
      summary: Delete build data with all associated data (coverage, methods, instances)
      description: |
        Permanently deletes a specific application build and all its associated data, including code coverage records,
        method metadata, and instance deployments. Use this endpoint to clean up obsolete builds or free storage.
      operationId: deleteBuild
      tags:
        - data-management
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier for the application group containing the build.
          schema:
            type: string
        - name: appId
          in: path
          required: true
          description: Unique identifier for the application containing the build.
          schema:
            type: string
        - name: buildId
          in: path
          required: true
          description: Unique identifier of the build to delete. This is the internal build ID assigned by the system.
          schema:
            type: string
      responses:
        '200':
          description: Build deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-management/groups/{groupId}/tests/sessions/{testSessionId}:
    delete:
      summary: Delete test session data with all associated data (coverage, test launches)
      description: |
        Permanently deletes a specific test session and all its associated data, including test launch records
        and code coverage data collected during the session. Use this endpoint to clean up
        invalid or obsolete test sessions.
      operationId: deleteTestSession
      tags:
        - data-management
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          description: Unique identifier for the application group containing the test session.
          schema:
            type: string
        - name: testSessionId
          in: path
          required: true
          description: Unique identifier of the test session to delete.
          schema:
            type: string
      responses:
        '200':
          description: Test Session deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  # Metrics Endpoints
  /api/metrics/applications:
    get:
      summary: Get applications
      description: |
        Retrieves a list of all registered applications in Drill4J.
      operationId: getApplications
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: false
          description: Optional filter to retrieve applications belonging to a specific group only.
          schema:
            type: string
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/builds:
    get:
      summary: Get builds
      description: |
        Retrieves a paginated list of application builds for a specific application.
      operationId: getBuilds
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          description: Unique identifier for the application group.
          schema:
            type: string
        - name: appId
          in: query
          required: true
          description: Unique identifier for the application.
          schema:
            type: string
        - name: branch
          in: query
          description: Optional Git branch name filter. When specified, only builds from this branch are returned.
          schema:
            type: string
        - name: envId
          in: query
          description: Optional environment identifier filter. When specified, only builds deployed in this environment are returned.
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination (1-based). Defaults to 1 if not specified.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: Number of items per page. Defaults to a system-defined value if not specified.
          schema:
            type: integer
      responses:
        '200':
          description: List of builds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/build-diff-report:
    get:
      summary: Get build diff report
      description: |
        Generates a comprehensive diff report comparing a target build against a baseline build. The report includes
        summary statistics on code changes (new, modified, deleted methods), overall and per-change-type coverage percentages,
        risk assessment based on uncovered changes. The target build is identified by
        instanceId, commitSha, or buildVersion; the baseline build is identified by baselineInstanceId, baselineCommitSha,
        or baselineBuildVersion.
      operationId: getBuildDiffReport
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          description: Unique identifier for the application group.
          schema:
            type: string
        - name: appId
          in: query
          required: true
          description: Unique identifier for the application.
          schema:
            type: string
        - name: instanceId
          in: query
          description: Instance ID of the target build deployment.
          schema:
            type: string
        - name: commitSha
          in: query
          description: Git commit SHA of the target build.
          schema:
            type: string
        - name: buildVersion
          in: query
          description: Build version of the target build.
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          description: Instance ID of the baseline build deployment.
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          description: Git commit SHA of the baseline build.
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          description: Build version of the baseline build.
          schema:
            type: string
        - name: coverageThreshold
          in: query
          description: Minimum required coverage percentage (0.0–1.0) for the diff report quality gate.
          schema:
            type: number
            format: float
            default: 1.0
      responses:
        '200':
          description: Build diff report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/recommended-tests:
    get:
      summary: Get recommended tests
      description: |
        Analyzes code changes between a target build and a baseline build and returns a list of tests recommended
        for execution based on impact analysis. The endpoint identifies which methods have changed and finds tests
        that previously covered those methods, recommending them for re-execution to validate the changes.
        When testsToSkip is true, the endpoint inverts the result - returning tests that can be safely skipped
        because they do not cover any changed code. The target build is identified by
        targetInstanceId, targetCommitSha, or targetBuildVersion. The baseline build is identified by
        baselineInstanceId, baselineCommitSha, baselineBuildVersion, or baselineBuildBranches.
      operationId: getRecommendedTests
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          description: Unique identifier for the application group.
          schema:
            type: string
        - name: appId
          in: query
          required: true
          description: Unique identifier for the application.
          schema:
            type: string
        - name: testsToSkip
          in: query
          description: When true, returns tests that can be safely skipped (not impacted by changes). When false (default), returns tests that should be executed because they cover changed code.
          schema:
            type: boolean
            default: false
        - name: testTaskId
          in: query
          description: Optional test task ID filter. When specified, only considers test launches associated with this task ID for recommendations.
          schema:
            type: string
        - name: targetInstanceId
          in: query
          description: Instance ID of the target build. One of targetInstanceId, targetCommitSha, or targetBuildVersion should be provided.
          schema:
            type: string
        - name: targetCommitSha
          in: query
          description: Git commit SHA of the target build. One of targetInstanceId, targetCommitSha, or targetBuildVersion should be provided.
          schema:
            type: string
        - name: targetBuildVersion
          in: query
          description: Build version of the target build. One of targetInstanceId, targetCommitSha, or targetBuildVersion should be provided.
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          description: Instance ID of the baseline build. If not provided, the system automatically selects the previous build as baseline.
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          description: Git commit SHA of the baseline build. If not provided, the system automatically selects the previous build as baseline.
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          description: Build version of the baseline build. If not provided, the system automatically selects the previous build as baseline.
          schema:
            type: string
        - name: baselineBuildBranches
          in: query
          description: List of Git branch names to consider when selecting the baseline build. Useful when the baseline should be chosen from specific branches (e.g., main, develop).
          schema:
            type: array
            items:
              type: string
        - name: coveragePeriodDays
          in: query
          description: Number of days to look back for coverage data when determining test recommendations. Limits the scope of historical coverage data used for analysis.
          schema:
            type: integer
      responses:
        '200':
          description: Recommended tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/coverage-treemap:
    get:
      summary: Get coverage treemap
      description: |
        Retrieves a hierarchical treemap representation of code coverage data for a specific build. The treemap
        organizes methods into a package/class hierarchy, where each node contains aggregated coverage statistics.
      operationId: getCoverageTreemap
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: buildId
          in: query
          required: true
          description: Internal build identifier for which to retrieve coverage treemap data.
          schema:
            type: string
        - name: testTag
          in: query
          description: Optional test tag filter. When specified, only coverage data from tests with this tag is included.
          schema:
            type: string
        - name: envId
          in: query
          description: Optional environment identifier filter. When specified, only coverage data from this environment is included.
          schema:
            type: string
        - name: branch
          in: query
          description: Optional Git branch filter. When specified, only coverage data from this branch is included.
          schema:
            type: string
        - name: packageNamePattern
          in: query
          description: Optional package name pattern filter for narrowing results to specific packages.
          schema:
            type: string
        - name: classNamePattern
          in: query
          description: Optional class name pattern filter for narrowing results to specific classes.
          schema:
            type: string
        - name: rootId
          in: query
          description: Optional root node identifier to retrieve a specific subtree of the treemap hierarchy. Used for drill-down navigation.
          schema:
            type: string
      responses:
        '200':
          description: Coverage treemap data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/changes-coverage-treemap:
    get:
      summary: Get changes coverage treemap
      description: |
        Retrieves a hierarchical treemap representation of code coverage focused only on changed methods
        between a target build and a baseline build.
      operationId: getChangesCoverageTreemap
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: buildId
          in: query
          required: true
          description: Internal build identifier of the target (newer) build.
          schema:
            type: string
        - name: baselineBuildId
          in: query
          required: true
          description: Internal build identifier of the baseline (older) build to compare against.
          schema:
            type: string
        - name: testTag
          in: query
          description: Optional test tag filter. When specified, only coverage data from tests with this tag is included.
          schema:
            type: string
        - name: envId
          in: query
          description: Optional environment identifier filter. When specified, only coverage data from this environment is included.
          schema:
            type: string
        - name: branch
          in: query
          description: Optional Git branch filter. When specified, only coverage data from this branch is included.
          schema:
            type: string
        - name: packageNamePattern
          in: query
          description: Optional package name pattern filter for narrowing results to specific packages.
          schema:
            type: string
        - name: classNamePattern
          in: query
          description: Optional class name pattern filter for narrowing results to specific classes.
          schema:
            type: string
        - name: rootId
          in: query
          description: Optional root node identifier to retrieve a specific subtree of the treemap hierarchy.
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination (1-based). Defaults to 1 if not specified.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: Number of items per page. Defaults to a system-defined value if not specified.
          schema:
            type: integer
        - name: includeDeleted
          in: query
          description: Whether to include methods that were deleted in the target build (present in baseline but absent in target). Defaults to false.
          schema:
            type: boolean
        - name: includeEqual
          in: query
          description: Whether to include methods that are unchanged between builds. Defaults to false.
          schema:
            type: boolean
      responses:
        '200':
          description: Changes coverage treemap data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/changes:
    get:
      summary: Get method changes between builds
      description: |
        Retrieves a paginated list of method-level changes between a target build and a baseline build.
        The target build is identified by instanceId, commitSha, or buildVersion; the baseline build is identified
        by baselineInstanceId, baselineCommitSha, or baselineBuildVersion.
      operationId: getMethodChanges
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          description: Unique identifier for the application group.
          schema:
            type: string
        - name: appId
          in: query
          required: true
          description: Unique identifier for the application.
          schema:
            type: string
        - name: instanceId
          in: query
          description: Instance ID of the target build deployment.
          schema:
            type: string
        - name: commitSha
          in: query
          description: Git commit SHA of the target build.
          schema:
            type: string
        - name: buildVersion
          in: query
          description: Build version of the target build.
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          description: Instance ID of the baseline build deployment.
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          description: Git commit SHA of the baseline build.
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          description: Build version of the baseline build.
          schema:
            type: string
        - name: includeDeleted
          in: query
          description: Whether to include methods that were deleted in the target build (present in baseline but absent in target). Defaults to false.
          schema:
            type: boolean
        - name: includeEqual
          in: query
          description: Whether to include methods that are unchanged between builds. Defaults to false.
          schema:
            type: boolean
        - name: page
          in: query
          description: Page number for pagination (1-based). Defaults to 1 if not specified.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: Number of items per page. Defaults to a system-defined value if not specified.
          schema:
            type: integer
      responses:
        '200':
          description: List of method changes between builds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/coverage:
    get:
      summary: Get coverage by methods for a build
      description: |
        Retrieves a paginated list of methods with their code coverage data for a specific build.
      operationId: getCoverageByMethods
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: buildId
          in: query
          required: true
          description: Internal build identifier for which to retrieve method-level coverage data.
          schema:
            type: string
        - name: testTag
          in: query
          description: Optional test tag filter. When specified, only coverage data from tests with this tag is included.
          schema:
            type: string
        - name: envId
          in: query
          description: Optional environment identifier filter. When specified, only coverage data from this environment is included.
          schema:
            type: string
        - name: branch
          in: query
          description: Optional Git branch filter. When specified, only coverage data from this branch is included.
          schema:
            type: string
        - name: packageNamePattern
          in: query
          description: Optional package name pattern filter for narrowing results to specific packages.
          schema:
            type: string
        - name: classNamePattern
          in: query
          description: Optional class name pattern filter for narrowing results to specific classes.
          schema:
            type: string
        - name: page
          in: query
          description: Page number for pagination (1-based). Defaults to 1 if not specified.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: Number of items per page. Defaults to a system-defined value if not specified.
          schema:
            type: integer
      responses:
        '200':
          description: Method list with coverage data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/impacted-tests:
    get:
      summary: Get impacted tests
      description: |
        Retrieves a paginated list of tests that are impacted by code changes between a target build and a baseline build.
        Impact analysis identifies which tests previously covered methods that have been modified, added, or deleted.
      operationId: getImpactedTests
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          description: Unique identifier for the application group.
          schema:
            type: string
        - name: appId
          in: query
          required: true
          description: Unique identifier for the application.
          schema:
            type: string
        - name: instanceId
          in: query
          description: Instance ID of the target build deployment.
          schema:
            type: string
        - name: commitSha
          in: query
          description: Git commit SHA of the target build.
          schema:
            type: string
        - name: buildVersion
          in: query
          description: Build version of the target build.
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          description: Instance ID of the baseline build deployment.
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          description: Git commit SHA of the baseline build.
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          description: Build version of the baseline build.
          schema:
            type: string
        - name: packageName
          in: query
          description: Optional filter to only consider methods in this package when determining impacted tests.
          schema:
            type: string
        - name: className
          in: query
          description: Optional filter to only consider methods in this class when determining impacted tests.
          schema:
            type: string
        - name: methodName
          in: query
          description: Optional filter to only consider methods with this name when determining impacted tests.
          schema:
            type: string
        - name: excludeMethodSignatures
          in: query
          description: List of method signatures to exclude from impact analysis. Tests covering only excluded methods will not be returned. Signature format is "className:methodName:params:returnType".
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: testTaskId
          in: query
          description: Optional filter by test task ID. When specified, only tests from launches associated with this task ID are considered.
          schema:
            type: string
        - name: testTag
          in: query
          description: Optional filter by test tag. When specified, only tests with this tag are included.
          schema:
            type: string
        - name: testPath
          in: query
          description: Optional filter by test source path. When specified, only tests at this path are included.
          schema:
            type: string
        - name: testName
          in: query
          description: Optional filter by test name. When specified, only tests with this name are included.
          schema:
            type: string
        - name: coverageBranches
          in: query
          description: List of Git branch names to consider when selecting coverage data for impact analysis.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: coverageAppEnvIds
          in: query
          description: List of application environment IDs to consider when selecting coverage data for impact analysis.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: sortBy
          in: query
          description: Field name to sort results by. Supported values are testPath, testName, testRunner, impactedMethods.
          schema:
            type: string
            enum:
              - testPath
              - testName
              - testRunner
              - impactedMethods
        - name: sortOrder
          in: query
          description: Sort order direction. ASC for ascending, DESC for descending. Defaults to ASC if not specified.
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: page
          in: query
          description: Page number for pagination (1-based). Defaults to 1 if not specified.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: Number of items per page. Defaults to a system-defined value if not specified.
          schema:
            type: integer
      responses:
        '200':
          description: List of impacted tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
    post:
      summary: Get impacted tests (POST)
      description: |
        POST variant of the impacted tests endpoint. Accepts the same parameters as the GET endpoint but via a JSON
        request body instead of query parameters. Useful when the number of filter parameters is large or contains
        complex values (e.g., lists of method signatures to exclude) that are impractical to pass as query parameters.
      operationId: postImpactedTests
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpactedTestsRequest'
      responses:
        '200':
          description: List of impacted tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/impacted-methods:
    get:
      summary: Get impacted methods
      description: |
        Retrieves a paginated list of methods that have been covered by tests and changed between a target build and a baseline build. 
        While impacted-tests shows which tests are affected by changes, impacted-methods shows
        which changed methods are covered (or uncovered) by existing tests.
      operationId: getImpactedMethods
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          description: Unique identifier for the application group.
          schema:
            type: string
        - name: appId
          in: query
          required: true
          description: Unique identifier for the application.
          schema:
            type: string
        - name: instanceId
          in: query
          description: Instance ID of the target build deployment.
          schema:
            type: string
        - name: commitSha
          in: query
          description: Git commit SHA of the target build.
          schema:
            type: string
        - name: buildVersion
          in: query
          description: Build version of the target build.
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          description: Instance ID of the baseline build deployment.
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          description: Git commit SHA of the baseline build.
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          description: Build version of the baseline build
          schema:
            type: string
        - name: packageName
          in: query
          description: Optional filter by package name to narrow results to methods in a specific package.
          schema:
            type: string
        - name: className
          in: query
          description: Optional filter by class name to narrow results to methods in a specific class.
          schema:
            type: string
        - name: methodName
          in: query
          description: Optional filter by method name to narrow results to a specific method.
          schema:
            type: string
        - name: testTaskId
          in: query
          description: Optional filter by test task ID. When specified, only test launches from this task ID are considered for impact counting.
          schema:
            type: string
        - name: testTag
          in: query
          description: Optional filter by test tag. When specified, only tests with this tag are considered for impact counting.
          schema:
            type: string
        - name: testPath
          in: query
          description: Optional filter by test source path. When specified, only tests at this path are considered for impact counting.
          schema:
            type: string
        - name: testName
          in: query
          description: Optional filter by test name. When specified, only tests with this name are considered for impact counting.
          schema:
            type: string
        - name: sortBy
          in: query
          description: Field name to sort results by. Supported values are signature, className, name, impactedTests.
          schema:
            type: string
            enum:
              - signature
              - className
              - name
              - impactedTests
        - name: sortOrder
          in: query
          description: Sort order direction. ASC for ascending, DESC for descending. Defaults to ASC if not specified.
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: page
          in: query
          description: Page number for pagination (1-based). Defaults to 1 if not specified.
          schema:
            type: integer
        - name: pageSize
          in: query
          description: Number of items per page. Defaults to a system-defined value if not specified.
          schema:
            type: integer
      responses:
        '200':
          description: List of impacted methods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
    post:
      summary: Get impacted methods (POST)
      description: |
        POST variant of the impacted methods endpoint. Accepts the same parameters as the GET endpoint but via a JSON
        request body instead of query parameters. Useful when the number of filter parameters is large or contains
        complex values that are impractical to pass as query parameters.
      operationId: postImpactedMethods
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpactedMethodsRequest'
      responses:
        '200':
          description: List of impacted methods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/refresh:
    post:
      summary: Refresh metrics
      description: |
        Triggers an immediate ETL (Extract-Transform-Load) job to refresh computed metrics data.
      operationId: refreshMetrics
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          description: Group ID to refresh metrics for. If not provided, refreshes metrics for all groups.
          in: query
          required: false
          schema:
            type: string
        - name: reset
          description: If true, clears existing computed data and restarts the ETL process from scratch.
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Metrics were refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/metrics/refresh-status:
    get:
      summary: Get refresh status
      description: |
        Retrieves the current status of the metrics ETL (Extract-Transform-Load) refresh process for a specific
        application group. Returns information about whether a refresh is currently in progress, the last
        successful refresh timestamp, and any error details if the last refresh failed.
      operationId: metricsRefreshStatus
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          description: Unique identifier for the application group whose refresh status is being queried.
          schema:
            type: string
      responses:
        '200':
          description: Metrics status was retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  # User Authentication Routes
  /api/sign-in:
    post:
      summary: Sign in
      description: |
        Authenticates a user with username and password credentials. On successful authentication, returns a JWT token.
      operationId: signIn
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPayload'
      responses:
        '200':
          description: User successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/sign-up:
    post:
      summary: Sign up
      description: |
        Registers a new user account in the system. The newly created account requires administrator approval
        before it becomes active.
      operationId: signUp
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpPayload'
      responses:
        '200':
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/sign-out:
    post:
      summary: Sign out
      description: |
        Signs the current user out by clearing the JWT authentication cookie.
      operationId: signOut
      tags:
        - auth
      responses:
        '200':
          description: User successfully signed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/user-info:
    get:
      summary: Get user info
      description: |
        Retrieves profile information for the currently authenticated user, including username, role, and
        registration status.
      operationId: getUserInfo
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      responses:
        '200':
          description: User info retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/update-password:
    post:
      summary: Update password
      description: |
        Changes the password for the currently authenticated user. The old password must be provided for verification
        before the new password is set. 
      operationId: updatePassword
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordPayload'
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  # User Management Routes
  /api/users:
    get:
      summary: Get users
      description: |
        Retrieves a list of all registered users in the system.
      operationId: getAllUsers
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListDataResponse'
  /api/users/{userId}:
