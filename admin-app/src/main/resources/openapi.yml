        - auth
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique numeric identifier of the user whose password is being reset.
          schema:
            type: integer
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  # User API Key Routes
  /api/user-keys:
    get:
      summary: Get user API keys
      description: |
        Retrieves all API keys owned by the currently authenticated user.
      operationId: getUserApiKeys
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      responses:
        '200':
          description: List of user API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListDataResponse'
    post:
      summary: Generate user API key
      description: |
        Generates a new API key for the currently authenticated user. The API key value is returned only once in the response - it cannot be
        retrieved again after creation, so it must be stored securely by the client.
      operationId: generateUserApiKey
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateApiKeyPayload'
      responses:
        '200':
          description: API Key successfully generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/user-keys/{id}:
    delete:
      summary: Delete user API key
      description: |
        Deletes a specific API key owned by the currently authenticated user.
      operationId: deleteUserApiKeyById
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: Unique numeric identifier of the API key to delete.
          schema:
            type: integer
      responses:
        '200':
          description: API Key successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  # API Key Management Routes
  /api/api-keys:
    get:
      summary: Get API keys
      description: |
        Retrieves a list of all API keys across all users in the system.
      operationId: getApiKeys
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListDataResponse'
    post:
      summary: Generate API key
      description: |
        Generates a new API key on behalf of any user.
      operationId: generateApiKey
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateApiKeyPayload'
      responses:
        '200':
          description: API Key successfully generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/api-keys/{id}:
    delete:
      summary: Delete API key
      description: |
        Deletes any API key by its ID.
      operationId: deleteApiKeyById
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: Unique numeric identifier of the API key to delete.
          schema:
            type: integer
      responses:
        '200':
          description: API Key successfully deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
  schemas:
    # Common Schemas
    DataResponse:
      type: object
      properties:
        data:
          type: object
    ListDataResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
    MessageResponse:
      type: object
      properties:
        message:
          type: string

    # Data Ingest Schemas
    BuildPayload:
      type: object
      description: |
        Application build metadata payload. Captures build version information and associated Git commit metadata 
        for change tracking and impact analysis. The buildVersion or commitSha must be provided to identify the build.
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group in Drill4J.
        appId:
          type: string
          description: Unique identifier for the application in Drill4J.
        commitSha:
          type: string
          nullable: true
          description: Git commit SHA (full hash) that uniquely identifies the commit associated with this build. Either commitSha or buildVersion must be provided to create a build. If both are provided, buildVersion takes priority and becomes part of the buildId.
        buildVersion:
          type: string
          nullable: true
          description: Semantic version or build identifier for this application build. Either buildVersion or commitSha must be provided to create a build. When both are specified, buildVersion is prioritized and becomes part of the buildId for identification.
        branch:
          type: string
          nullable: true
          description: Git branch name where this build was created.
        commitDate:
          type: string
          nullable: true
          description: Timestamp of the Git commit associated with this build.
        commitMessage:
          type: string
          nullable: true
          description: Commit message describing the changes included in this build.
        commitAuthor:
          type: string
          nullable: true
          description: Name or identifier of the commit author.
      required:
        - groupId
        - appId
    InstancePayload:
      type: object
      description: |
        Application instance metadata payload. Represents a specific deployment of an application build in a particular environment.
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group in Drill4J.
        appId:
          type: string
          description: Unique identifier for the application in Drill4J.
        instanceId:
          type: string
          description: Unique identifier for this specific instance (deployment) of the application. Can be a UUID or any other unique identifier that distinguishes this deployment.
        commitSha:
          type: string
          nullable: true
          description: Git commit SHA (hash) of the application build running on this instance. Either commitSha or buildVersion should be provided to identify the deployed build.
        buildVersion:
          type: string
          nullable: true
          description: Semantic version or build identifier of the application build running on this instance. Either buildVersion or commitSha should be provided to identify the deployed build.
        envId:
          type: string
          nullable: true
          description: Environment identifier where this application instance is deployed (e.g., 'dev', 'staging', 'production'). Specifies the deployment environment context.
      required:
        - groupId
        - appId
        - instanceId
    CoveragePayload:
      type: object
      description: |
        Code coverage execution data payload. Contains bytecode execution probes collected during test execution that indicate
        which code instructions (probes) were executed by tests.
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group in Drill4J.
        appId:
          type: string
          description: Unique identifier for the application in Drill4J.
        instanceId:
          type: string
          description: Unique identifier for the application instance (previously saved via /api/data-ingest/instances).
        commitSha:
          type: string
          nullable: true
          description: Git commit SHA of the build associated with the application instance where the tests were executed. Either commitSha or buildVersion should be provided to identify the build.
        buildVersion:
          type: string
          nullable: true
          description: Unique identifier of the build associated with the application instance where the tests were executed. Either buildVersion or commitSha should be provided to identify the build.
        coverage:
          type: array
          description: Array of code coverage data per method/function.
          items:
            $ref: '#/components/schemas/SingleMethodCoveragePayload'
      required:
        - groupId
        - appId
        - instanceId
        - coverage
    SingleMethodCoveragePayload:
      type: object
      description: |
        Code coverage execution data for a single method/function under a specific test. Contains the method signature for identification and 
        an array of boolean probes representing bytecode instructions. Each probe corresponds to a specific location in the method bytecode - 
        true if the instruction was executed during the test, false if it was not executed. The bodyChecksum ensures consistency and 
        helps detect method modifications between builds.
      properties:
        signature:
          type: string
          description: Fully qualified method signature uniquely identifying the method for which coverage data is provided. Format is '<class_name>:<method_name>:<method_argument_classes_comma_separated>:<method_return_type>' (e.g., method `void myMethod(String param)` will be represented as 'com.example.MyClass:myMethod:java.lang.String:'.
        bodyChecksum:
          type: string
          description: Checksum (hash) of the method body bytecode (saved via /api/data-ingest/methods). Used to verify method consistency and ensure that coverage data corresponds to the exact method implementation.
        testId:
          type: string
          nullable: true
          description: Unique identifier of the individual test that was executed and produced this coverage data for this method. Reference to the test launch id (saved via /api/data-ingest/test-launches). When present, the coverage is associated with a specific test and testSessionId must also be provided. If testId is absent but testSessionId is provided, the coverage is associated only with the test session, not with a specific test.
        testSessionId:
          type: string
          nullable: true
          description: Unique identifier of the test session during which the coverage was recorded. Reference to the test session id (saved via /api/data-ingest/test-session). When absent, indicates global coverage data collected outside of any specific test session context.
        probes:
          type: array
          deprecated: true
          description: |
            Array of boolean values representing the execution state of each bytecode probe (instruction) in the method.
            Index position corresponds to probe position in bytecode. True indicates the probe was executed; false indicates it was not executed during the test.
            Deprecated: use "stringProbes" instead.
          items:
            type: boolean
        stringProbes:
          type: string
          description: Representing the execution state of each bytecode probe (instruction) in the method as a string of '1's and '0's, where '1' represents true (executed) and '0' represents false (not executed).
      required:
        - signature
        - bodyChecksum
    MethodsPayload:
      type: object
      description: |
        Application methods metadata payload. Contains structural information for all methods in a specific build,
        including method signatures, bytecode instrumentation details, and checksums. Used to map coverage data
        to actual code methods.
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group in Drill4J.
        appId:
          type: string
          description: Unique identifier for the application in Drill4J.
        commitSha:
          type: string
          nullable: true
          description: Git commit SHA of the build containing these methods. Either commitSha or buildVersion should be provided to identify the build.
        buildVersion:
          type: string
          nullable: true
          description: Build version or semantic version identifier containing these methods. Either buildVersion or commitSha should be provided to identify the build.
        methods:
          type: array
          description: Array of method metadata. Each element represents a method found in the application build.
          items:
            $ref: '#/components/schemas/SingleMethodPayload'
      required:
        - groupId
        - appId
        - methods
    SingleMethodPayload:
      type: object
      description: |
        Metadata for a single method/function in an application. Contains the method signature (fully qualified name with parameters),
        bytecode instrumentation information (probes and their positions), and checksums for consistency verification.
        The bodyChecksum is critical for detecting method modifications between builds - if a method's bytecode changes,
        the checksum changes.
      properties:
        classname:
          type: string
          description: Fully qualified class name (e.g., 'com.example.MyClass') containing this method.
        name:
          type: string
          description: Method name (e.g., 'myMethod'). Does not include package or class name.
        params:
          type: string
          description: Method parameter types (e.g., '' if no parameters, 'java.lang.String,java.lang.Integer' for String and Integer parameters). 
        returnType:
          type: string
          description: Return type (e.g., '' if void, 'java.lang.Boolean' for boolean).
        probesCount:
          type: integer
          description: Total number of bytecode probes (instrumentation points) inserted into this method. Coverage data consists of boolean arrays matching this count.
        probesStartPos:
          type: integer
          description: The bytecode position (offset) where probes for this method begin within the class file where this method is defined. Used to correlate probe indices in coverage data with actual bytecode locations in the class.
        bodyChecksum:
          type: string
          description: Checksum (hash) of the method body bytecode. Used to detect method modifications between builds. If method implementation changes, this checksum changes.
      required:
        - classname
        - name
        - params
        - returnType
        - probesCount
        - bodyChecksum
    AddTestsPayload:
      type: object
      description: |
        Consolidated test metadata payload combining test definitions and test launch execution records in a single request.
        This provides an alternative to separate API calls for test-definitions and test-launches when both data is available together.
        Each test entry contains its definition metadata (what test exists) and launch information (how it executed).
      required:
        - groupId
        - sessionId
        - tests
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group.
        sessionId:
          type: string
          description: Unique identifier for the test session that groups these test executions. Reference to the test session id (saved via /api/data-ingest/test-session).
        tests:
          type: array
          description: Array of test entries, each combining definition metadata and execution result. One entry per test execution.
          items:
            $ref: '#/components/schemas/TestInfo'
    TestInfo:
      type: object
      description: |
        Combined test definition and test launch information in a single entry. Contains both the test metadata (what the test is)
        and the execution result (how it performed). Equivalent to providing test-definitions and test-launches data together.
      required:
        - testLaunchId
        - testDefinitionId
        - result
      properties:
        testLaunchId:
          type: string
          description: Unique identifier for this test execution (launch). Distinguishes this particular test run from other runs.
        testDefinitionId:
          type: string
          description: Unique identifier for the test definition. Reused across multiple executions of the same test.
        result:
          $ref: '#/components/schemas/TestResult'
          description: Execution outcome of the test (PASSED, FAILED, SKIPPED, etc.).
        duration:
          type: integer
          description: Execution duration in milliseconds.
        details:
          $ref: '#/components/schemas/TestDetails'
          description: Test definition metadata (test framework, location, tags) combined with execution details.
    TestDetails:
      type: object
      description: |
        Test definition metadata (test framework, source location, name, tags, custom properties). Combined with TestInfo to provide
        complete test context in a single payload entry.
      required:
        - runner
        - path
        - testName
      properties:
        runner:
          type: string
          description: Test runner framework identifier (e.g., 'JUnit4', 'JUnit5', 'TestNG', 'pytest'). Identifies the testing framework.
        path:
          type: string
          nullable: true
          description: File path or class path to the test source code (e.g., 'src/test/java/com/example/UserTest.java').
        testName:
          type: string
          description: Human-readable test name (e.g., 'testUserRegistration', 'should_calculate_sum_correctly').
        testParams:
          type: array
          description: Test method parameters (for parameterized tests). Optional list of parameter values.
          items:
            type: string
        metadata:
          type: object
          description: Optional arbitrary key-value pairs for custom test attributes (e.g., author, priority, component).
          additionalProperties:
            type: string
        tags:
          type: array
          description: Optional array of test tags for organizing and filtering tests (e.g., 'smoke', 'regression', 'slow').
          items:
            type: string
    TestResult:
      type: string
      enum:
        - PASSED
        - FAILED
        - ERROR
        - SKIPPED
        - SMART_SKIPPED
        - UNKNOWN
    AddTestDefinitionsPayload:
      type: object
      description: |
        Test definitions metadata payload. Contains the blueprint or specification for multiple test cases in the system.
        Test definitions are distinct from test launches - a definition represents "what test exists" while a launch represents
        "when and how the test was executed". Definitions are typically static and reused across multiple test executions.
      required:
        - groupId
        - definitions
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group in Drill4J. 
        definitions:
          type: array
          description: Array of test definition metadata. Each element describes a unique test that can be executed.
          items:
            $ref: '#/components/schemas/TestDefinitionPayload'
    TestDefinitionPayload:
      type: object
      description: |
        Metadata for a single test definition. Represents the blueprint or specification of a test case, independent of when or how it is executed.
        The test definition provides context for understanding test execution results and associating coverage data with specific tests.
        Definitions serve as the static reference point, while test launches (executions) are the dynamic instances of running a test.
      required:
        - id
        - runner
        - path
        - name
      properties:
        id:
          type: string
          description: Unique identifier for this test definition. Used to reference this test in test launches. Must be globally unique within the groupId. If test path or test name changes, a new test definition with a new id should be created to reflect the change.
        runner:
          type: string
          description: Test runner framework (e.g., 'JUnit4', 'JUnit5', 'TestNG', 'pytest', 'mocha'). Identifies which test framework/platform this test belongs to.
        name:
          type: string
          description: Human-readable test name (e.g., 'testUserRegistration', 'should calculate sum correctly'). Typically the method name or test case name in the source code.
        type:
          type: string
          nullable: true
          description: Optional test type classification (e.g., 'unit', 'integration', 'smoke', 'regression', 'e2e'). Used to categorize tests by their scope and purpose.
        path:
          type: string
          nullable: true
          description: File path or class path where the test is defined (e.g., 'src/test/java/com/example/UserTest.java' or 'tests/user_test.py'). Helps locate the test in source code.
        tags:
          type: array
          description: Optional array of tags for categorizing and filtering tests (e.g., ['slow', 'database', 'critical'], ['@tag.one', '@tag.two']). Used for test selection and organization.
          items:
            type: string
        metadata:
          type: object
          description: Optional json object for storing custom test metadata. Framework or project-specific information.
          nullable: true
          additionalProperties: true
    AddTestLaunchesPayload:
      type: object
      description: Batch payload for persisting test execution records within a single test session. Contains all launches of test cases that occurred within a cohesive test run context.
      required:
        - groupId
        - testSessionId
        - launches
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group.
        testSessionId:
          type: string
          description: Unique identifier for the test session that groups these test launches together. Reference to the test session id (saved via /api/data-ingest/test-session).
        launches:
          type: array
          description: Array of individual test execution records. Each element is a single test execution with its result and timing information.
          items:
            $ref: '#/components/schemas/TestLaunchPayload'
    TestLaunchPayload:
      type: object
      description: Metadata for a single test execution (launch). Records the concrete instance of running a test case, including execution outcome and timing.
      required:
        - id
        - testDefinitionId
      properties:
        id:
          type: string
          description: Unique identifier for this test launch (execution record). Can be a UUID or any other unique identifier that distinguishes this test launch.
        testDefinitionId:
          type: string
          description: Reference to a test definition id (previously saved via /api/data-ingest/test-definitions). Links this execution to the metadata of the test being run.
        result:
          type: string
          nullable: true
          description: Execution result of the test (e.g., 'SUCCESS', 'FAILURE', 'SKIPPED', 'ERROR'). Indicates whether the test passed, failed, or was skipped.
        duration:
          type: integer
          format: int32
          nullable: true
          description: Execution duration in milliseconds. Time taken to run the test from start to finish.
    SessionPayload:
      type: object
      description: |
        Test session metadata that groups multiple application builds into a unified testing context. A test session represents
        a cohesive test execution effort and records which builds and application versions were tested together.
      required:
        - id
        - groupId
        - startedAt
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group. All builds and test launches associated with this session belong to this group.
        id:
          type: string
          description: Unique identifier for this test session. Can be a UUID or any other unique identifier. Must be unique within groupId.
        testTaskId:
          type: string
          nullable: true
          description: Optional identifier for a test task or campaign that triggered this session (e.g., CI/CD pipeline ID, scheduled test job ID). Provides additional context for organizing sessions.
        startedAt:
          type: string
          format: date-time
          description: Timestamp when the test session was initiated.
        builds:
          type: array
          description: Array of application builds tested within this session.
          items:
            $ref: '#/components/schemas/SingleSessionBuildPayload'
    SingleSessionBuildPayload:
      type: object
      description: Reference to a specific application build that was tested within the session. Identifies the exact application, deployment instance, and code version tested.
      required:
        - appId
        - commitSha
        - buildVersion
      properties:
        appId:
          type: string
          description: Application identifier within the group. Enables testing of multiple applications within a single session.
        commitSha:
          type: string
          description: Git commit SHA of the tested code version. Either commitSha or buildVersion must be provided to identify a build.
        buildVersion:
          type: string
          description: Application build version identifier. Either commitSha or buildVersion must be provided to identify a build.
    MethodIgnoreRulePayload:
      type: object
      description: |
        Rule definition for excluding methods from coverage analysis and metrics computation.
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group this rule applies to.
        appId:
          type: string
          description: Unique identifier for the application this rule applies to.
        namePattern:
          type: string
          nullable: true
          description: Glob-style pattern for matching method names to exclude (e.g., 'get*', 'set*', 'toString'). Methods with names matching this pattern will be excluded from analysis.
        classnamePattern:
          type: string
          nullable: true
          description: Glob-style pattern for matching fully qualified class names to exclude (e.g., 'com.example.generated.*'). All methods in classes matching this pattern will be excluded.
    # Auth Schemas
    LoginPayload:
      type: object
      description: |
        User authentication credentials for signing in to the system.
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: The username of the account to authenticate.
        password:
          type: string
          description: The password for the account.
    SignUpPayload:
      type: object
      description: |
        New user registration payload. Creates a user account that requires administrator approval before activation.
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Desired username for the new account. Must be unique in the system.
        password:
          type: string
          description: Password for the new account.
        email:
          type: string
          description: Optional email address for the new user.
    UpdatePasswordPayload:
      type: object
      description: |
        Password change request payload. The old password is verified before the new password is set.
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
          description: The current password of the user. Must match the existing password for verification.
        newPassword:
          type: string
          description: The new password to set for the user.
    EditUserPayload:
      type: object
      description: |
        Payload for editing user properties. Currently supports changing the user's role.
      required:
        - role
      properties:
        username:
          type: string
          description: Updated username (currently not used for modification).
        email:
          type: string
          description: Updated email address (currently not used for modification).
        role:
          type: string
          description: New role for the user. Supported values are 'ADMIN' and 'USER'.
          enum:
            - ADMIN
            - USER
    GenerateApiKeyPayload:
      type: object
      description: |
        Payload for generating a new API key.
      required:
        - name
      properties:
        name:
          type: string
          description: Human-readable description or name for the API key (e.g., 'CI/CD pipeline key', 'Agent key for staging').
    # Settings Schemas
    GroupSettingsPayload:
      type: object
      description: |
        Configuration settings for an application group. Controls data lifecycle policies and metrics computation scope.
      properties:
        retentionPeriodDays:
          type: integer
          nullable: true
          description: Number of days to retain raw ingested data (builds, coverage, methods, test sessions) before automatic cleanup. Set to null to use the system default.
        metricsPeriodDays:
          type: integer
          nullable: true
          description: Number of days of historical data to include when computing metrics and coverage aggregations. Set to null to use the system default.
    # Metrics Request Schemas
    ImpactedTestsRequest:
      type: object
      description: |
        Request body for the POST variant of the impacted tests endpoint.
      required:
        - groupId
        - appId
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group.
        appId:
          type: string
          description: Unique identifier for the application.
        instanceId:
          type: string
          nullable: true
          description: Instance ID of the target build. One of instanceId, commitSha, or buildVersion should be provided.
        commitSha:
          type: string
          nullable: true
          description: Git commit SHA of the target build. One of instanceId, commitSha, or buildVersion should be provided.
        buildVersion:
          type: string
          nullable: true
          description: Build version of the target build. One of instanceId, commitSha, or buildVersion should be provided.
        baselineInstanceId:
          type: string
          nullable: true
          description: Instance ID of the baseline build. If not provided, the system automatically selects the previous build.
        baselineCommitSha:
          type: string
          nullable: true
          description: Git commit SHA of the baseline build. If not provided, the system automatically selects the previous build.
        baselineBuildVersion:
          type: string
          nullable: true
          description: Build version of the baseline build. If not provided, the system automatically selects the previous build.
        packageName:
          type: string
          nullable: true
          description: Optional filter to only consider methods in this package when determining impacted tests.
        className:
          type: string
          nullable: true
          description: Optional filter to only consider methods in this class when determining impacted tests.
        methodName:
          type: string
          nullable: true
          description: Optional filter to only consider methods with this name when determining impacted tests.
        excludeMethodSignatures:
          type: array
          items:
            type: string
          description: List of method signatures to exclude from impact analysis. Tests covering only excluded methods will not be returned. Signature format is "className:methodName:params:returnType".
        testTaskId:
          type: string
          nullable: true
          description: Optional filter by test task ID. When specified, only tests from launches associated with this task ID are considered.
        testTag:
          type: string
          nullable: true
          description: Optional filter by test tag. When specified, only tests with this tag are included.
        testPath:
          type: string
          nullable: true
          description: Optional filter by test source path. When specified, only tests at this path are included.
        testName:
          type: string
          nullable: true
          description: Optional filter by test name. When specified, only tests with this name are included.
        coverageBranches:
          type: array
          items:
            type: string
          description: List of Git branch names to consider when selecting coverage data for impact analysis.
        coverageAppEnvIds:
          type: array
          items:
            type: string
          description: List of application environment IDs to consider when selecting coverage data for impact analysis.
        sortBy:
          type: string
          enum:
            - testPath
            - testName
            - testRunner
            - impactedMethods
          description: Field name to sort results by.
          nullable: true
        sortOrder:
          type: string
          enum:
            - ASC
            - DESC
          description: Sort order direction. Defaults to ASC if not specified.
          nullable: true
        page:
          type: integer
          nullable: true
        pageSize:
          type: integer
          nullable: true
    ImpactedMethodsRequest:
      type: object
      description: |
        Request body for the POST variant of the impacted methods endpoint.
      required:
        - groupId
        - appId
      properties:
        groupId:
          type: string
          description: Unique identifier for the application group.
        appId:
          type: string
          description: Unique identifier for the application.
        instanceId:
          type: string
          nullable: true
          description: Instance ID of the target build. One of instanceId, commitSha, or buildVersion should be provided.
        commitSha:
          type: string
          nullable: true
          description: Git commit SHA of the target build. One of instanceId, commitSha, or buildVersion should be provided.
        buildVersion:
          type: string
          nullable: true
          description: Build version of the target build. One of instanceId, commitSha, or buildVersion should be provided.
        baselineInstanceId:
          type: string
          nullable: true
          description: Instance ID of the baseline build. If not provided, the system automatically selects the previous build.
        baselineCommitSha:
          type: string
          nullable: true
          description: Git commit SHA of the baseline build. If not provided, the system automatically selects the previous build.
        baselineBuildVersion:
          type: string
          nullable: true
          description: Build version of the baseline build. If not provided, the system automatically selects the previous build.
        packageName:
          type: string
          nullable: true
          description: Optional filter by package name to narrow results to methods in a specific package.
        className:
          type: string
          nullable: true
          description: Optional filter by class name to narrow results to methods in a specific class.
        methodName:
          type: string
          nullable: true
          description: Optional filter by method name to narrow results to a specific method.
        testTaskId:
          type: string
          nullable: true
          description: Optional filter by test task ID. When specified, only test launches from this task ID are considered for impact counting.
        testTag:
          type: string
          nullable: true
          description: Optional filter by test tag. When specified, only tests with this tag are considered for impact counting.
        testPath:
          type: string
          nullable: true
          description: Optional filter by test source path. When specified, only tests at this path are considered for impact counting.
        testName:
          type: string
          nullable: true
          description: Optional filter by test name. When specified, only tests with this name are considered for impact counting.
        sortBy:
          type: string
          enum:
            - signature
            - className
            - name
            - impactedTests
          description: Field name to sort results by.
          nullable: true
        sortOrder:
          type: string
          enum:
            - ASC
            - DESC
          description: Sort order direction. Defaults to ASC if not specified.
          nullable: true
        page:
          type: integer
          nullable: true
        pageSize:
          type: integer
          nullable: true
