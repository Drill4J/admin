openapi: 3.0.0
info:
  title: Drill4J API
  version: 1.0.0
paths:
  #Settings Endpoints
  /api/group-settings/{groupId}:
    get:
      summary: Get group settings
      operationId: getGroupSettingsById
      tags:
        - settings
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group settings retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
    put:
      summary: Save group settings
      operationId: updateGroupSettingsById
      tags:
        - settings
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupSettingsPayload'
      responses:
        '200':
          description: Group settings saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
    delete:
      summary: Delete group settings
      operationId: deleteGroupSettingsById
      tags:
        - settings
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Group settings deleted successfully

  # Data Ingest Endpoints
  /api/data-ingest/builds:
    put:
      summary: Persist application build metadata
      description: |
        Saves application build information, including build version and associated Git commit metadata. 
        This endpoint captures critical build data required for change tracking, impact analysis, risk assessment, and 
        correlation with test coverage metrics. The service ingests build metadata from instrumented applications to enable 
        detailed analysis of code changes, test recommendations, and coverage reports across different application versions.
      operationId: putBuild
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/BuildPayload'
      responses:
        '200':
          description: Build saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/instances:
    put:
      summary: Persist application instance metadata
      description: |
        Saves information about a running instance of the application deployed in a specific environment. 
        An instance represents a concrete deployment of an application build in a particular environment (e.g., development, staging, production).
        This endpoint captures the association between a specific build version deployed on an instance and the environment where it runs, 
        enabling tracking of code changes and test execution across different deployment environments.
      operationId: putInstance
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstancePayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/InstancePayload'
      responses:
        '200':
          description: Instance saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/coverage:
    post:
      summary: Persist code coverage data
      description: |
        Saves detailed code coverage data collected from test executions. The endpoint ingests execution probes (bytecode instrumentation data)
        that track which methods and code paths were executed during testing. Coverage data is associated with a specific test session, test launch
        and application instance to enable measurement of test effectiveness and identification of untested code changes.
      operationId: postCoverage
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoveragePayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/CoveragePayload'
      responses:
        '200':
          description: Coverage saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/methods:
    put:
      summary: Persist application methods metadata
      description: |
        Saves detailed metadata for all methods/functions in an application build, including method signatures,
        bytecode instrumentation information (probes), and checksums. This endpoint captures the structural information
        required to understand which code locations can be instrumented for coverage analysis.
      operationId: putMethods
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MethodsPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/MethodsPayload'
      responses:
        '200':
          description: Methods saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/tests-metadata:
    post:
      summary: Persist test definitions and launches in a single operation
      description: |
        Saves test metadata (test definitions and test launches) in a single consolidated API call.
        This endpoint is an alternative to the separate two-step process of first calling /api/data-ingest/test-definitions
        and then /api/data-ingest/test-launches. Use this endpoint when you have both test definition metadata and execution results
        available at the same time and want to persist them together.
      operationId: postTestsMetadata
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTestsPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/AddTestsPayload'
      responses:
        '200':
          description: Test metadata saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/test-definitions:
    post:
      summary: Persist test definition metadata
      description: |
        Saves metadata for all test definitions in the system. A test definition is the specification or blueprint
        for a test, including its unique identifier, runner type (JUnit, TestNG, etc.), name, location, and any custom metadata or tags.
      operationId: postTestDefinitions
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTestDefinitionsPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/AddTestDefinitionsPayload'
      responses:
        '200':
          description: Test definitions saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/test-launches:
    post:
      summary: Persist test execution records
      description: |
        A test launch is a concrete instance of executing a specific test,
        with associated execution result and timing information. Multiple test launches are grouped into a single test session
        to represent a cohesive test run (e.g., all tests executed in a single CI/CD pipeline build).
        
        Test launches establish the relationship between test definitions (blueprint of what to test) and coverage data (what code was executed),
        enabling analysis of test effectiveness and identification of which tests exercise which code changes. Each launch references a previously
        saved test definition by id and belongs to a test session that contextualizes the execution.
      operationId: postTestLaunches
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTestLaunchesPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/AddTestLaunchesPayload'
      responses:
        '200':
          description: Test launches saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/sessions:
    put:
      summary: Persist test session metadata
      description: |
        Saves a test session that groups multiple test launches to represent a cohesive test run (e.g., all tests executed in a single CI/CD pipeline build).        
        The session metadata also establishes the relationship between test launches (individual test executions) and the application builds
        being tested.
      operationId: putTestSession
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionPayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/SessionPayload'
      responses:
        '200':
          description: Test sessions saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-ingest/method-ignore-rules:
    post:
      summary: Save method ignore rule
      operationId: postMethodIgnoreRules
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MethodIgnoreRulePayload'
          application/protobuf:
            schema:
              $ref: '#/components/schemas/MethodIgnoreRulePayload'
      responses:
        '200':
          description: Method ignore rule saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
    get:
      summary: Get all method ignore rules
      operationId: getAllMethodIgnoreRules
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      responses:
        '200':
          description: List of method ignore rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/data-ingest/method-ignore-rules/{id}:
    delete:
      summary: Delete method ignore rule by ID
      operationId: deleteMethodIgnoreRuleById
      tags:
        - data-ingest
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Method ignore rule deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  # Data Management Endpoints
  /api/data-management/groups/{groupId}/apps/{appId}/builds/{buildId}:
    delete:
      summary: Delete build data with all associated data (coverage, methods, instances)
      operationId: deleteBuild
      tags:
        - data-management
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: buildId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Build deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/data-management/groups/{groupId}/tests/sessions/{testSessionId}:
    delete:
      summary: Delete test session data with all associated data (coverage, test launches)
      operationId: deleteTestSession
      tags:
        - data-management
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
        - name: testSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Test Session deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  # Metrics Endpoints
  /api/metrics/applications:
    get:
      summary: Get applications
      operationId: getApplications
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/builds:
    get:
      summary: Get builds
      operationId: getBuilds
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          schema:
            type: string
        - name: appId
          in: query
          required: true
          schema:
            type: string
        - name: branch
          in: query
          schema:
            type: string
        - name: envId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of builds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/build-diff-report:
    get:
      summary: Get build diff report
      operationId: getBuildDiffReport
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          schema:
            type: string
        - name: appId
          in: query
          required: true
          schema:
            type: string
        - name: instanceId
          in: query
          schema:
            type: string
        - name: commitSha
          in: query
          schema:
            type: string
        - name: buildVersion
          in: query
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          schema:
            type: string
        - name: coverageThreshold
          in: query
          schema:
            type: number
            format: float
            default: 1.0
      responses:
        '200':
          description: Build diff report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/recommended-tests:
    get:
      summary: Get recommended tests
      operationId: getRecommendedTests
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          schema:
            type: string
        - name: appId
          in: query
          required: true
          schema:
            type: string
        - name: testsToSkip
          in: query
          schema:
            type: boolean
            default: false
        - name: testTaskId
          in: query
          schema:
            type: string
        - name: targetInstanceId
          in: query
          schema:
            type: string
        - name: targetCommitSha
          in: query
          schema:
            type: string
        - name: targetBuildVersion
          in: query
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          schema:
            type: string
        - name: baselineBuildBranches
          in: query
          description: List of baseline build branches to consider.
          schema:
            type: array
            items:
              type: string
        - name: coveragePeriodDays
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Recommended tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/coverage-treemap:
    get:
      summary: Get coverage treemap
      operationId: getCoverageTreemap
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: buildId
          in: query
          required: true
          schema:
            type: string
        - name: testTag
          in: query
          schema:
            type: string
        - name: envId
          in: query
          schema:
            type: string
        - name: branch
          in: query
          schema:
            type: string
        - name: packageNamePattern
          in: query
          schema:
            type: string
        - name: classNamePattern
          in: query
          schema:
            type: string
        - name: rootId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Coverage treemap data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/changes-coverage-treemap:
    get:
      summary: Get changes coverage treemap
      operationId: getChangesCoverageTreemap
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: buildId
          in: query
          required: true
          schema:
            type: string
        - name: baselineBuildId
          in: query
          required: true
          schema:
            type: string
        - name: testTag
          in: query
          schema:
            type: string
        - name: envId
          in: query
          schema:
            type: string
        - name: branch
          in: query
          schema:
            type: string
        - name: packageNamePattern
          in: query
          schema:
            type: string
        - name: classNamePattern
          in: query
          schema:
            type: string
        - name: rootId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: includeDeleted
          in: query
          schema:
            type: boolean
        - name: includeEqual
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Changes coverage treemap data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/changes:
    get:
      summary: Get method changes between builds
      operationId: getMethodChanges
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          schema:
            type: string
        - name: appId
          in: query
          required: true
          schema:
            type: string
        - name: instanceId
          in: query
          schema:
            type: string
        - name: commitSha
          in: query
          schema:
            type: string
        - name: buildVersion
          in: query
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          schema:
            type: string
        - name: includeDeleted
          in: query
          schema:
            type: boolean
        - name: includeEqual
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of method changes between builds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/coverage:
    get:
      summary: Get coverage by methods for a build
      operationId: getCoverageByMethods
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: buildId
          in: query
          required: true
          schema:
            type: string
        - name: testTag
          in: query
          schema:
            type: string
        - name: envId
          in: query
          schema:
            type: string
        - name: branch
          in: query
          schema:
            type: string
        - name: packageNamePattern
          in: query
          schema:
            type: string
        - name: classNamePattern
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Method list with coverage data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
  /api/metrics/impacted-tests:
    get:
      summary: Get impacted tests
      operationId: getImpactedTests
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          schema:
            type: string
        - name: appId
          in: query
          required: true
          schema:
            type: string
        - name: instanceId
          in: query
          schema:
            type: string
        - name: commitSha
          in: query
          schema:
            type: string
        - name: buildVersion
          in: query
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          schema:
            type: string
        - name: packageName
          in: query
          schema:
            type: string
        - name: className
          in: query
          schema:
            type: string
        - name: methodName
          in: query
          schema:
            type: string
        - name: testTaskId
          in: query
          schema:
            type: string
        - name: testTag
          in: query
          schema:
            type: string
        - name: testPath
          in: query
          schema:
            type: string
        - name: testName
          in: query
          schema:
            type: string
        - name: coverageBranches
          in: query
          description: List of coverage branches to consider.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: coverageAppEnvIds
          in: query
          description: List of coverage app env IDs to consider.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: excludeMethodSignatures
          in: query
          description: List of method signatures to exclude from impact analysis. Tests covering only excluded methods will not be returned. Signature format is "className:methodName:params:returnType" (e.g., "com.example.Class:method1:():void").
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: sortBy
          in: query
          description: Field name to sort results by. Supported values are testPath, testName, testRunner, impactedMethods.
          schema:
            type: string
            enum:
              - testPath
              - testName
              - testRunner
              - impactedMethods
        - name: sortOrder
          in: query
          description: Sort order direction. ASC for ascending, DESC for descending. Defaults to ASC if not specified.
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of impacted tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
    post:
      summary: Get impacted tests (POST)
      operationId: postImpactedTests
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpactedTestsRequest'
      responses:
        '200':
          description: List of impacted tests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDataResponse'
  /api/metrics/impacted-methods:
    get:
      summary: Get impacted methods
      operationId: getImpactedMethods
      tags:
        - metrics
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: groupId
          in: query
          required: true
          schema:
            type: string
        - name: appId
          in: query
          required: true
          schema:
            type: string
        - name: instanceId
          in: query
          schema:
            type: string
        - name: commitSha
          in: query
          schema:
            type: string
        - name: buildVersion
          in: query
          schema:
            type: string
        - name: baselineInstanceId
          in: query
          schema:
            type: string
        - name: baselineCommitSha
          in: query
          schema:
            type: string
        - name: baselineBuildVersion
          in: query
          schema:
            type: string
        - name: packageName
          in: query
          schema:
            type: string
        - name: className
          in: query
          schema:
            type: string
        - name: methodName
          in: query
          schema:
            type: string
        - name: testTaskId
          in: query
          schema:
            type: string
        - name: testTag
          in: query
          schema:
            type: string
        - name: testPath
          in: query
          schema:
            type: string
        - name: testName
          in: query
          schema:
            type: string
        - name: coverageBranches
          in: query
          description: List of coverage branches to consider.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: coverageAppEnvIds
          in: query
          description: List of coverage app env IDs to consider.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: sortBy
          in: query
          description: Field name to sort results by. Supported values are signature, className, name, impactedTests.
          schema:
            type: string
            enum:
              - signature
