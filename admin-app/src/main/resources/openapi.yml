      summary: Get user by ID
      description: |
        Retrieves detailed information for a specific user by their unique numeric identifier.
      operationId: getUserById
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique numeric identifier of the user to retrieve.
          schema:
            type: integer
      responses:
        '200':
          description: User retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataResponse'
    put:
      summary: Edit user
