      operationId: editUserById
      tags:
        - auth
      security:
        - apiKeyAuth: [ ]
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique numeric identifier of the user to edit.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditUserPayload'
