ktor {
    deployment {
        port = 8090
        port = ${?PORT}
    }
    application {
        modules = [com.epam.drill.admin.DrillAdminApplicationKt.module]
    }
    security {
        ssl {
            keyStore = ${?SSL_KEY_STORE}
            keyAlias = ${?SSL_KEY_ALIAS}
            keyStorePassword = ${?SSL_KEY_STORE_PASSWORD}
            privateKeyPassword = ${?SSL_PRIVATE_KEY_PASSWORD}
        }
    }
}

kafka {
    bootstrapServers = "localhost:9092"
    bootstrapServers = ${?DRILL_KAFKA_BOOTSTRAP_SERVERS}
    securityProtocol = ${?DRILL_KAFKA_SECURITY_PROTOCOL}
    saslMechanism = ${?DRILL_KAFKA_SASL_MECHANISM}
    saslJaasConfig = ${?DRILL_KAFKA_SASL_JAAS_CONFIG}
    sslTruststoreLocation = ${?DRILL_KAFKA_SSL_TRUSTSTORE_LOCATION}
    sslTruststorePassword = ${?DRILL_KAFKA_SSL_TRUSTSTORE_PASSWORD}
    sslKeystoreLocation = ${?DRILL_KAFKA_SSL_KEYSTORE_LOCATION}
    sslKeystorePassword = ${?DRILL_KAFKA_SSL_KEYSTORE_PASSWORD}
    sslKeyPassword = ${?DRILL_KAFKA_SSL_KEY_PASSWORD}
    sslEndpointIdentificationAlgorithm = ${?DRILL_KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM}
}

drill {
    database {
        host = ${?DRILL_DB_HOST}
        port = ${?DRILL_DB_PORT}
        dbName = ${?DRILL_DB_NAME}
        userName = ${?DRILL_DB_USER_NAME}
        password = ${?DRILL_DB_PASSWORD}
        maximumPoolSize = ${?DRILL_DB_MAX_POOL_SIZE}
        ssl = ${?DRILL_DB_SSL}
    }
    auth {
        jwt {
            secret = ${?DRILL_JWT_SECRET}
            lifetime = ${?DRILL_JWT_LIFETIME}
        }
        apiKey {
        }
        oauth2 {
            enabled = false
            enabled = ${?DRILL_OAUTH2_ENABLED}
            authorizeUrl = ${?DRILL_OAUTH2_AUTHORIZE_URL}
            accessTokenUrl = ${?DRILL_OAUTH2_ACCESS_TOKEN_URL}
            userInfoUrl = ${?DRILL_OAUTH2_USERINFO_URL}
            clientId = ${?DRILL_OAUTH2_CLIENT_ID}
            clientSecret = ${?DRILL_OAUTH2_CLIENT_SECRET}
            scopes = ${?DRILL_OAUTH2_SCOPES}
            redirectUrl = ${?DRILL_OAUTH2_REDIRECT_URL}
            automaticSignIn = false
            automaticSignIn = ${?DRILL_OAUTH2_AUTOMATIC_SIGN_IN}
            tokenMapping {
                username = "sub"
                username = ${?DRILL_OAUTH2_TOKEN_MAPPING_USERNAME}
                roles = ${?DRILL_OAUTH2_TOKEN_MAPPING_ROLES}
            }
            userInfoMapping {
                username = "username"
                username = ${?DRILL_OAUTH2_USERINFO_MAPPING_USERNAME}
                roles = ${?DRILL_OAUTH2_USERINFO_MAPPING_ROLES}
            }
            roleMapping {
                user = "USER"
                user = ${?DRILL_OAUTH2_ROLE_MAPPING_USER}
                admin = "ADMIN"
                admin = ${?DRILL_OAUTH2_ROLE_MAPPING_ADMIN}
            }
        }
        simple {
            enabled = true
            enabled = ${?DRILL_AUTH_SIMPLE_ENABLED}
            signUpEnabled = true
            signUpEnabled = ${?DRILL_AUTH_SIMPLE_SIGN_UP_ENABLED}
            passwordStrength {
            }
        }
    }
    rawData {
        queue {
            type = ${?DRILL_RAW_DATA_QUEUE_TYPE}
            capacity = ${?DRILL_RAW_DATA_QUEUE_CAPACITY}
            workers = ${?DRILL_RAW_DATA_QUEUE_WORKERS}
            kafka {
                topic = "drill-raw-data"
                topic = ${?DRILL_RAW_DATA_QUEUE_KAFKA_TOPIC}
                consumerGroupId = "drill-writer"
                consumerGroupId = ${?DRILL_RAW_DATA_QUEUE_KAFKA_CONSUMER_GROUP_ID}
                pollTimeoutMs = 500
                pollTimeoutMs = ${?DRILL_RAW_DATA_QUEUE_KAFKA_POLL_TIMEOUT_MS}
                shutdownTimeoutMs = 5000
                shutdownTimeoutMs = ${?DRILL_RAW_DATA_QUEUE_KAFKA_SHUTDOWN_TIMEOUT_MS}
                producer {
                    clientId = "drill-admin-raw-data-producer"
                    clientId = ${?DRILL_RAW_DATA_QUEUE_KAFKA_PRODUCER_CLIENT_ID}
                }
                consumer {
                    clientId = "drill-admin-raw-data-consumer"
                    clientId = ${?DRILL_RAW_DATA_QUEUE_KAFKA_CONSUMER_CLIENT_ID}
                }
            }
        }
    }
    metrics {
        database {
            host = ${?DRILL_DB_HOST}
            host = ${?DRILL_METRICS_DB_HOST}
            port = ${?DRILL_DB_PORT}
            port = ${?DRILL_METRICS_DB_PORT}
            dbName = ${?DRILL_DB_NAME}
            dbName = ${?DRILL_METRICS_DB_NAME}
            userName = ${?DRILL_DB_USER_NAME}
            userName = ${?DRILL_METRICS_DB_USER_NAME}
            password = ${?DRILL_DB_PASSWORD}
            password = ${?DRILL_METRICS_DB_PASSWORD}
            maximumPoolSize = ${?DRILL_DB_MAX_POOL_SIZE}
            maximumPoolSize = ${?DRILL_METRICS_DB_MAX_POOL_SIZE}
            ssl = ${?DRILL_DB_SSL}
            ssl = ${?DRILL_METRICS_DB_SSL}
        }
        ui {
            baseUrl = ${?DRILL_METRICS_UI_BASE_URL}
            buildTestingReportPath = "/dashboard/2"
            buildTestingReportPath = ${?DRILL_METRICS_UI_BUILD_TESTING_REPORT_PATH }
            buildChangesReportPath = "/dashboard/5"
            buildChangesReportPath = ${?DRILL_METRICS_UI_BUILD_CHANGES_REPORT_PATH }
            impactedTestsReportPath = "/dashboard/13"
            impactedTestsReportPath = ${?DRILL_METRICS_UI_IMPACTED_TESTS_REPORT_PATH }
        }
    }
    testRecommendations {
    }
    scheduler {
        dataRetentionJobCron = "0 0 1 * * ?"
        dataRetentionJobCron = ${?DRILL_SCHEDULER_DATA_RETENTION_JOB_CRON}
        etlJobCron = "0 * * * * ?"
        etlJobCron = ${?DRILL_SCHEDULER_ETL_JOB_CRON}
    }
    etl {
        bufferSize = 2000
        bufferSize = ${?DRILL_ETL_BUFFER_SIZE}
        fetchSize = 2000
        fetchSize = ${?DRILL_ETL_FETCH_SIZE}
        batchSize = 1000
        batchSize = ${?DRILL_ETL_BATCH_SIZE}
        extractionLimit = 1000000
        extractionLimit = ${?DRILL_ETL_EXTRACTION_LIMIT}
        transformationBufferSize = 2000
        transformationBufferSize = ${?DRILL_ETL_TRANSFORMATION_BUFFER_SIZE}
        loggingFrequency = 10
        loggingFrequency = ${?DRILL_ETL_LOGGING_FREQUENCY}
        consistencyWindow = 0
        consistencyWindow = ${?DRILL_ETL_CONSISTENCY_WINDOW}
        processingDelay = 0
        processingDelay = ${?DRILL_ETL_PROCESSING_DELAY}
    }
}
